# Netlify build config for the LOE Capacity Dashboard (loe-dashboard/).
# Connect Netlify to this repo on the `main` branch — these settings drive the build.
# The site is a static SPA that fetches report CSVs at runtime from the public
# loe-report/all-pis branch (see loe-dashboard/src/data.ts). No env vars or secrets needed.
[build]
  base = "loe-dashboard"
  command = "npm run build"
  publish = "dist"

# SPA fallback: serve index.html for client-side routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
